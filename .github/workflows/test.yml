name: PR Automation Workflow
on:
  check_suite:
    types: [completed]
  status:
  issue_comment:
    types: [created]

permissions:
  checks: read
  statuses: read

jobs:
  route_pr:
    runs-on: ubuntu-latest
    steps:
      - name: Node 8 -> 1, 3, 4 (CI completion)
        if: github.event_name == 'check_suite' || github.event_name == 'status'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          apt-get update && apt-get install -y gh
          # Node 8 -> Node 3: Merge conflicts
          gh pr list \
            --state open \
            --search '-label:copilot' \
            --json number,mergeable \
            --jq '.[] | select(.mergeable == "CONFLICTING") | .number' \
            | xargs -I {} gh pr comment {} --body "@copilot Resolve merge conflict" && \
            xargs -I {} gh pr edit {} --add-label copilot

          # Node 8 -> Node 1: CI failures
          gh pr list \
            --state open \
            --search '-label:copilot' \
            --json number,statusCheckRollup \
            --jq '.[] | select((.statusCheckRollup // []) | any(.conclusion == "FAILURE")) | .number' \
            | xargs -I {} gh pr comment {} --body "@copilot Fix broken CI" && \
            xargs -I {} gh pr edit {} --add-label copilot

          # Node 8 -> Node 4: All CI success
          # review-requested:@copilot: Currently being reviewed by Copilot
          gh pr list \
            --state open \
            --search '-review-requested:@copilot' \
            --json number,statusCheckRollup \
            --jq '.[] | select((.statusCheckRollup // []) | all(.conclusion == "SUCCESS")) | .number' \
            | xargs -I {} gh api \
              --method POST \
              /repos/${{ github.repository }}/pulls/{}/requested_reviewers \
              -f "reviewers[]=copilot-pull-request-reviewer[bot]"

      - name: Node 4 -> 2, 5 (Copilot comment)
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request && github.event.comment.user.login == 'copilot-pull-request-reviewer[bot]'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ github.event.issue.number }}
          COMMENT_BODY="${{ github.event.comment.body }}"

          # Node 4 -> Node 5: No new comments
          if echo "$COMMENT_BODY" | grep -q "no new comments"; then
            gh pr edit $PR_NUMBER --remove-assignee @copilot --add-reviewer oleander --add-assignee oleander
          else
            # Node 4 -> Node 2: Has comments
            gh pr comment $PR_NUMBER --body "@copilot Fix review comments"
          fi
