name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  ACTIONS_RUNTIME_TOKEN: dummy
  CARGO_TERM_COLOR: always

jobs:
  artifact:
    runs-on: ${{ matrix.os }}
    continue-on-error: false
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          cache-on-failure: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly
          targets: ${{ matrix.target }}

      - name: Add x86_64-unknown-linux-musl target
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          rustup target add x86_64-unknown-linux-musl
          sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install Dependencies for musl Target
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools musl-dev perl make pkg-config libssl-dev
          # Set up environment for musl compilation
          echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> $GITHUB_ENV
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> $GITHUB_ENV

      - name: Install Dependencies for Linux Target
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build for target
        run: |
          cargo build \
            -Z unstable-options \
            --profile release-with-debug \
            --artifact-dir bin \
            --target ${{ matrix.target }}

      - name: Upload and compress artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: git-ai-${{ matrix.target }}
          if-no-files-found: error
          path: bin/git-*

  release:
    runs-on: ubuntu-latest
    needs: artifact
    # contents: write is required: this job amends/commits the version bump,
    # creates+pushes git tags, and publishes a GitHub release.
    permissions:
      contents: write
    steps:
      # persist-credentials is intentionally left enabled (default): the later
      # "git push origin HEAD --tags" step relies on the checkout-provided token.
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5 # zizmor: ignore[artipacked]

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: nightly

      - name: Configure git user name
        env:
          GH_ACTOR: ${{ github.actor }}
        run: git config user.name "$GH_ACTOR"

      - name: Configure git email
        env:
          GH_ACTOR: ${{ github.actor }}
        run: git config user.email "${GH_ACTOR}@users.noreply.github.com"

      - name: Install cargo-bump
        run: cargo install cargo-bump

      - name: Bump version
        run: cargo bump patch --git-tag

      - name: Commit Version Bump
        run: git commit -a --amend --no-edit

      - name: New version
        id: app
        run: echo "version=$(git describe --tags --abbrev=0 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Delete old tag
        env:
          APP_VERSION: ${{ steps.app.outputs.version }}
        run: git tag -d "$APP_VERSION"

      - name: Create new tag
        env:
          APP_VERSION: ${{ steps.app.outputs.version }}
        run: git tag "v$APP_VERSION"

      - name: Publish to crates.io
        if: github.ref == 'refs/heads/main'
        # zizmor: ignore[use-trusted-publishing]
        # Intentionally uses CARGO_REGISTRY_TOKEN; migrating crates.io to OIDC
        # trusted publishing is out of scope for this change.
        run: cargo publish --allow-dirty

      - name: Test publish to crates.io (dry run)
        if: github.ref != 'refs/heads/main'
        # zizmor: ignore[use-trusted-publishing]
        run: cargo publish --dry-run --allow-dirty

      - name: Push to origin
        if: github.ref == 'refs/heads/main'
        run: git push origin HEAD --tags

      - name: Test push to origin (dry run)
        if: github.ref != 'refs/heads/main'
        run: git push origin HEAD --tags --dry-run

      - name: Download all artifacts
        env:
          RUN_ID: ${{ github.run_id }}
        run: gh run download "$RUN_ID"

      - name: Zip each downloaded directory
        run: |
          for dir in $(ls -d git-ai-*); do
            tar -czf ${dir}.tar.gz ${dir}
          done

      - name: Uploads compressed artifacts
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: v${{ steps.app.outputs.version }}
          fail_on_unmatched_files: true
          files: git-ai-*.tar.gz
