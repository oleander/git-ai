name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # rust-toolchain.toml pins the nightly version; install clippy+rustfmt for
      # *that* toolchain (not floating nightly, whose components wouldn't match).
      - name: Install pinned toolchain + components
        run: |
          rustup show
          rustup component add clippy rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run cargo fmt
        run: cargo fmt -- --check

      - name: Security audit
        run: |
          cargo install cargo-audit --locked || true
          cargo audit || true

  test:
    needs: lint
    strategy:
      fail-fast: true
      matrix:
        os: [macos-latest, ubuntu-latest]
        rust: [nightly, stable]
    runs-on: ${{ matrix.os }}
    continue-on-error: false
    steps:
      - uses: actions/checkout@v5
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          override: true
          profile: minimal

      - name: Install fish (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt install fish

      - name: Install fish (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install fish

      - name: Run integration tests
        run: fish ./scripts/integration-tests

      - name: Run cargo test
        uses: actions-rs/cargo@v1
        with:
          command: test
